"brew:libtool" = "latest"
"brew:mise" = "latest"
"brew:neovim" = "latest"
"brew:ngrep" = "latest"
"brew:pyqt" = "latest"
"brew:qt@5" = "latest"
"brew:pyqt@5" = "latest"
"brew:qscintilla2" = "latest"
"brew:ripgrep" = "latest"
"brew:shellcheck" = "latest"
"brew:zoxide" = "latest"
"brew-cask:appcleaner" = "latest"
"brew-cask:bettertouchtool" = "latest"
"brew-cask:brave-browser" = "latest"
"brew-cask:chatgpt" = "latest"
"brew-cask:firefox" = "latest"
"brew-cask:font-jetbrains-mono" = "latest"
"brew-cask:ghostty" = "latest"
"brew-cask:google-chrome" = "latest"
"brew-cask:google-japanese-ime" = "latest"
"brew-cask:intellij-idea" = "latest"
"brew-cask:karabiner-elements" = "latest"
"brew-cask:obsidian" = "latest"
