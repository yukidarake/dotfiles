"brew-cask:zoom" = "latest"

[dotfiles]
"~/.config/git/ignore" = { source = ".config/git/ignore", mode = "symlink" }
"~/.vimrc" = { source = ".vimrc", mode = "symlink" }
"~/.ideavimrc" = { source = ".ideavimrc", mode = "symlink" }
"~/.terraformrc" = { source = ".terraformrc", mode = "symlink" }
"~/.zprofile" = { source = ".zprofile", mode = "symlink" }
"~/.zshrc" = { source = ".zshrc", mode = "symlink" }
"~/.config/fish/config.fish" = { source = ".config/fish/config.fish", mode = "symlink" }
"~/.config/fish/fish_plugins" = { source = ".config/fish/fish_plugins", mode = "symlink" }
"~/.config/ghostty/config" = { source = ".config/ghostty/config", mode = "symlink" }
"~/.config/herdr/config.toml" = { source = ".config/herdr/config.toml", mode = "symlink" }
"~/.config/karabiner/karabiner.json" = { source = ".config/karabiner/karabiner.json", mode = "symlink" }
"~/.config/nvim/init.vim" = { source = ".config/nvim/init.vim", mode = "symlink" }

[bootstrap.macos.keyboard]
initial_key_repeat = 10
key_repeat = 1

[bootstrap.macos.finder]
show_all_files = true

[bootstrap.macos.defaults]
"com.apple.desktopservices" = { DSDontWriteNetworkStores = true }
"com.apple.AppleMultitouchTrackpad" = { Dragging = true }
"NSGlobalDomain" = { AppleKeyboardUIMode = 2 }

[bootstrap.hooks.post-defaults]
# AppleSymbolicHotKeys は他のショートカットも含む辞書なので、宣言的な
# defaults で辞書全体を置き換えず、「次のウインドウへ移動」(27) だけを更新する。
run = '''
defaults write com.apple.symbolichotkeys AppleSymbolicHotKeys -dict-add 27 \
  '<dict><key>enabled</key><true/><key>value</key><dict><key>parameters</key><array><integer>65535</integer><integer>122</integer><integer>1048576</integer></array><key>type</key><string>standard</string></dict></dict>'
'''

[tasks.bootstrap]
description = "mise の宣言対象外となるユーザー環境をセットアップする"
run = "./scripts/bootstrap"
